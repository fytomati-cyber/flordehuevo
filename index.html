<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <title>Almacén Huevos FLOR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="huevoEstilo.css">

</head>

<body>
  
  <header>🥚🥚🥚 HUEVOS FLOR 🥚🥚🥚</header>

  <main>
    <!-- Botón configuración -->
    <button id="mostrarConfig">Configuración</button>
    <section id="configuracion" style="display: none;">
      <h2>Configuración de Precios</h2>
      <form id="configMenu">
        <label>Precio Super: <input type="number" id="precioChico" value="3500"></label>
        <label>Precio Mediano: <input type="number" id="precioMediano" value="4500"></label>
        <label>Precio Grande: <input type="number" id="precioGrande" value="5500"></label>
        <label>Precio Extra: <input type="number" id="precioJumbo" value="6500"></label>
        <button type="submit">Guardar Configuración</button>
      </form>
    </section>

    <!-- Registro de ventas -->
    <section>
      <h2>Registro de Ventas</h2>
      <form id="ventaForm">
        <fieldset>
          <legend>Selecciona el tamaño:</legend>
          <label><input type="radio" name="tamano" value="Chico" required> Super</label>
          <label><input type="radio" name="tamano" value="Mediano"> Mediano</label>
          <label><input type="radio" name="tamano" value="Grande"> Grande</label>
          <label><input type="radio" name="tamano" value="Jumbo"> Extra</label>
        </fieldset>
        <label for="cantidad">Cantidad de cartones:</label>
        <input type="number" id="cantidad" min="1" required>
        <button type="submit">Registrar venta</button>
      </form>
    </section>

    <!-- Filtros -->
    <section>
      <h2>Filtrar Ventas</h2>
      <select id="filtroTamano">
        <option value="todos">Mostrar todas</option>
        <option value="chico">Super</option>
        <option value="mediano">Mediano</option>
        <option value="grande">Grande</option>
        <option value="jumbo">Extra</option>
      </select>
    </section>

    <!-- Tabla de ventas -->
    <table id="tablaVentas">
      <thead>
        <tr>
          <th>Tamaño</th>
          <th>Cartones Vendidos</th>
          <th>Subtotal</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot>
        <tr>
          <td>Total de Cartones:</td>
          <td id="total">0</td>
          <td>Total en Ventas:</td>
          <td id="totalVentas">$0</td>
        </tr>
      </tfoot>
    </table>
  </main>

  <!-- Historial de ventas diarias -->
  <section>
    <h2>Historial de Ventas Diarias</h2>
    <table id="historialVentas">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Tamaño</th>
          <th>Cantidad</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="descargarExcel">Descargar Historial en Excel</button>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="Huevo.js"></script>
</body>
</html>
